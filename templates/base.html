<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Aegis{% endblock %}</title>
    <meta
      name="description"
      content="Aegis помогает оценить кредитные риски до подачи заявки в банк."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% set current_endpoint = request.endpoint or '' %}
    <div class="page-wrapper">
      <header class="site-header">
        <div class="container nav-container">
          <a
            class="logo"
            href="{{ url_for('index') }}"
            aria-label="Aegis — на главную"
            style="display: inline-flex; align-items: center; gap: 0.55rem;"
          >
            <svg
              width="32"
              height="32"
              viewBox="0 0 32 32"
              aria-hidden="true"
              focusable="false"
            >
              <defs>
                <linearGradient id="aegisShieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#667eea"></stop>
                  <stop offset="100%" stop-color="#764ba2"></stop>
                </linearGradient>
              </defs>
              <path
                d="M16 2L27 6V14C27 21.7 22.1 27.2 16 30C9.9 27.2 5 21.7 5 14V6L16 2Z"
                fill="url(#aegisShieldGradient)"
              ></path>
              <text
                x="16"
                y="20"
                text-anchor="middle"
                font-size="11"
                font-weight="800"
                fill="#ffffff"
                font-family="Inter, sans-serif"
              >
                A
              </text>
            </svg>
            <span>Aegis</span>
          </a>

          <button
            id="nav-toggle"
            class="nav-toggle"
            type="button"
            aria-label="Открыть меню"
            aria-controls="main-nav"
            aria-expanded="false"
          >
            ☰
          </button>

          <nav id="main-nav" class="main-nav" aria-label="Главная навигация">
            <a
              href="{{ url_for('index') }}"
              class="{% if current_endpoint == 'index' %}is-active{% endif %}"
              {% if current_endpoint == 'index' %}aria-current="page"{% endif %}
            >
              Главная
            </a>
            <a
              href="{{ url_for('loan_check') }}"
              class="{% if current_endpoint == 'loan_check' %}is-active{% endif %}"
              {% if current_endpoint == 'loan_check' %}aria-current="page"{% endif %}
            >
              Проверка кредита
            </a>
            <a
              href="{{ url_for('results') }}"
              class="{% if current_endpoint == 'results' %}is-active{% endif %}"
              {% if current_endpoint == 'results' %}aria-current="page"{% endif %}
            >
              Результаты
            </a>
            <a
              href="{{ url_for('dashboard') }}"
              class="{% if current_endpoint == 'dashboard' %}is-active{% endif %}"
              {% if current_endpoint == 'dashboard' %}aria-current="page"{% endif %}
            >
              Дашборд
            </a>
            <a
              href="{{ url_for('about') }}"
              class="{% if current_endpoint == 'about' %}is-active{% endif %}"
              {% if current_endpoint == 'about' %}aria-current="page"{% endif %}
            >
              О проекте
            </a>
          </nav>
        </div>
      </header>

      <main>{% block content %}{% endblock %}</main>

      <footer class="site-footer">
        <div class="container">
          <p>Aegis © 2026</p>
        </div>
      </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  </body>
</html>
